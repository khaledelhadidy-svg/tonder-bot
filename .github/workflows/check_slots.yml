name: Tonder Slot Checker TEST

on:
  schedule:
    - cron: '*/5 * * * *'
  repository_dispatch:
    types: [ping_from_cronjob]
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    
    permissions:
      contents: write  # REQUIRED for saving state!
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4.2.2
      
      - name: Set up Python
        uses: actions/setup-python@v5.4.0
        with:
          python-version: '3.11'
      
      - name: Install Chrome
        run: |
          sudo apt-get update
          sudo apt-get install -y chromium-browser chromium-chromedriver
      
      - name: Install Python packages
        run: |
          pip install --upgrade pip
          pip install selenium==4.15.0 requests==2.31.0
      
      - name: Run monitor test
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
        run: python monitor_test.py
      
      - name: Commit and push state file
        if: always()
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add slot_state.json
          git diff --staged --quiet || git commit -m "Update slot state [skip ci]"
          git push
