name: Tonder Slot Checker

on:
  schedule:
    - cron: '*/5 * * * *'  # Check every 5 minutes
  repository_dispatch:
    types: [ping_from_cronjob]
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    strategy:
      max-parallel: 1  # Prevent concurrent runs
      fail-fast: false  # Don't cancel other jobs if one fails
      
    steps:
      - name: Checkout code
        uses: actions/checkout@v4.2.2
      
      - name: Set up Python
        uses: actions/setup-python@v5.4.0
        with:
          python-version: '3.11'
      
      - name: Install Chrome and dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y chromium-browser chromium-chromedriver
          chromium-browser --version
          chromedriver --version
      
      - name: Install Python dependencies
        run: |
          pip install --upgrade pip
          pip install selenium==4.15.0 webdriver-manager==4.0.1 requests==2.31.0 beautifulsoup4==4.12.2
      
      - name: Run Monitor with retry
        id: monitor
        uses: nick-fields/retry@v2
        with:
          timeout_minutes: 5
          max_attempts: 3
          retry_on: error
          command: python monitor.py
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
      
      - name: Upload debug artifacts if failed
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: debug-output-${{ github.run_id }}
          path: |
            debug_page.html
            debug_error.png
            slot_count_state.txt
          retention-days: 3
