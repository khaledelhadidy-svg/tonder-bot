name: Tonder Slot Checker

on:
  schedule:
    # Runs every 10 minutes - This is much more reliable on GitHub Actions
    - cron: '*/10 * * * *'
    
  workflow_dispatch:   # Allows manual trigger from GitHub UI

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 10   # Safety timeout in case Selenium hangs

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install selenium webdriver-manager requests

      - name: Run Monitor
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
        run: |
          echo "======================================"
          echo "Starting Tonder slot check at: $(date -u)"
          echo "======================================"
          
          python monitor.py
          
          echo "======================================"
          echo "Check finished at: $(date -u)"
          echo "======================================"
